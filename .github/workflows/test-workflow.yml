name: Reuseable Next.js CI Workflow

on:
  workflow_call:
    # Definin the inputs that the calling workflow must provide
    inputs:
      environment_name:
        description: 'Deployment environment (e.g., development, staging, production)'
        required: true
        type: string

      node-version:
        description: 'Node.js version to use for the build'
        required: true
        type: string
        default: '20.9.0'


jobs:
  deploy:
    name: Build and Test According to Environment
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }} # development, staging, production
    timeout-minutes: 45
    env:
      NEXT_TELEMETRY_DISABLED: 1
      REPO_NAME: ${{ github.event.repository.name }} # myabroadfriend

    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      # created .env.local according to the environment. for devlopment, staging and production.
      # This file is required for next.js build if you are using environment variables in your code.
      - name: Create .env.local file
        run: |
          echo "${{ secrets.ENV_FILE_CONTENT }}" >> .env.local
       #   echo "NODE_ENV=${{ inputs.environment_name }}" > .env.local
       #   echo "DB_USER=${{ secrets.DB_USER }}" >> .env.local 
       #   echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env.local
       #   echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" >> .env.local
        # or we can simply use echo "${{ secrets.ENV_FILE_CONTENT }}" >> .env.local

      - name: 2. Set up Node.js
        uses : actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: 3. Install dependencies
        run: npm ci

      - name: 4. Run lint (non-blocking)
        continue-on-error: true
        run: |
          if node -e "process.exit(require('./package.json').scripts?.lint ? 0 : 1)"; then
            npm run lint
          else
            echo "No lint script found, skipping"
          fi
      - name: 5. Run tests
        run: |
          if node -e "process.exit(require('./package.json').scripts?.test ? 0 : 1)"; then
            npm test
          else
            echo "No test script found, skipping"
          fi

      - name: 6. Build application
        run: npm run build

      - name: Create clean deployment copy
        run: |
          mkdir -p /tmp/deploy

          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='README.md' \
            --exclude='*.log' \
            --exclude='.DS_Store' \
            --exclude='coverage' \
            --exclude='.nyc_output' \
            --exclude='__tests__' \
            --exclude='__mocks__' \
            --exclude='*.test.*' \
            --exclude='*.spec.*' \
            --exclude='.vscode' \
            --exclude='.idea' \
            --exclude='*.tmp' \
            --exclude='*.temp' \
            --exclude='node_modules' \
            ./ /tmp/deploy/

      - name: Debug secrets presence
        run: |
          if [ -z "${{ secrets.SERVER_HOST }}" ]; then
            echo "SERVER_HOST is EMPTY"
            exit 1
          else
            echo "From Environment Secrets SERVER_HOST is SET which is ${{ secrets.SERVER_HOST }}"
          fi

          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "SSH_PRIVATE_KEY is EMPTY"
            exit 1
          else
            echo "From Environment Secrets SSH_PRIVATE_KEY is SET which is ${{ secrets.SSH_PRIVATE_KEY }}"
          fi

          if [ -z "${{ secrets.SERVER_USERNAME }}" ]; then
            echo "SERVER_USERNAME is EMPTY"
            exit 1
          else
            echo "From Environment Secrets SERVER_USERNAME is SET which is ${{ secrets.SERVER_USERNAME }}"
          fi

          if [ -z "${{ secrets.PORT }}" ]; then
            echo "Secrets PORT is EMPTY"
          else
            echo "From Environment Secrets PORT is SET which is ${{ secrets.PORT }}"
          fi

          if [ -z "${{ vars.ENVIRONMENT }}" ]; then
            echo "ENVIRONMENT is EMPTY"
          else
            echo "From Environment vars ENVIRONMENT is SET which is ${{ vars.ENVIRONMENT }}"
          fi

          if [ -z "${{ vars.USERNAME }}" ]; then
            echo "USERNAME is EMPTY"
          else
            echo "From Environment vars USERNAME is SET which is ${{ vars.USERNAME }}"
          fi

          if [ -z "${{ vars.PORT }}" ]; then
            echo "Environment PORT is EMPTY"
          else
            echo "From Environment vars PORT is SET which is the ${{ vars.PORT }}"
          fi


      - name: 7. Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || {
            echo "Warning: Could not add server to known_hosts via ssh-keyscan"
            echo "Will rely on StrictHostKeyChecking=no"
          }
          if [ -f ~/.ssh/known_hosts ]; then
            chmod 644 ~/.ssh/known_hosts
          fi


      - name: 7. Prepare deployment directory locally for testing in the runner
        run: |
          mkdir -p /tmp/server/${{ env.REPO_NAME }}

      - name: 8. Deploy files to local server via rsync for testing in the runner
        run: |
          rsync -avz --delete \
          --progress \
          --human-readable \
            /tmp/deploy/ /tmp/server/${{ env.REPO_NAME }}/
      
      - name: Install production deps locally for testing in the runner
        run: |
          cd /tmp/server/${{ env.REPO_NAME }}
          npm ci --only=production --silent || echo "No production dependencies to install"

      - name: Pm2 Simulation for testing in the runner
        run: |
          echo "Simulating PM2 restart for testing in the runner"
          echo "Would run: pm2 restart /tmp/server/${{ env.REPO_NAME }}/server.js --name ${{ env.REPO_NAME }}"

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
          rm -rf /tmp/deploy


